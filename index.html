<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pankaj Bhardwaj</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#020d2d;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:10px;
}

.container{
    width:100%;
    max-width:340px;
}

.card{
    position:relative;
    background:linear-gradient(180deg,#03183d,#05062c);
    border:2px solid #2956ff;
    border-radius:25px;
    padding:18px;
    overflow:hidden;
    box-shadow:
    0 0 20px rgba(0,110,255,.4),
    inset 0 0 50px rgba(0,60,255,.15);
}

.card::before{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:#00aaff;
    filter:blur(100px);
    opacity:.12;
    top:120px;
    left:50%;
    transform:translateX(-50%);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    gap:10px;
}

.live{
    background:rgba(0,180,255,.08);
    border:1px solid rgba(0,180,255,.4);
    color:#00d4ff;
    padding:8px 14px;
    border-radius:30px;
    font-weight:700;
    font-size:11px;
}

.live::before{
    content:"●";
    margin-right:5px;
}

.traders{
    color:#9ca6c0;
    font-size:11px;
    text-align:right;
}

.profile{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    padding:4px;
    background:linear-gradient(45deg,#0059ff,#9945ff);
    box-shadow:0 0 25px rgba(0,150,255,.8);
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.title{
    text-align:center;
    margin-top:18px;
}

.title h1{
    color:#fff;
    font-size:38px;
    font-weight:800;
    line-height:1;
}

.title h2{
    font-size:38px;
    font-weight:800;
    line-height:1;
    background:linear-gradient(90deg,#00d9ff,#4e6cff,#b14cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    text-align:center;
    margin-top:18px;
    color:#b8c0d6;
    line-height:1.6;
    font-size:14px;
}

.features{
    margin-top:25px;
    display:flex;
    gap:8px;
}

.feature{
    flex:1;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    border-radius:18px;
    padding:15px 8px;
    text-align:center;
}

.feature h3{
    color:#00cfff;
    font-size:18px;
    font-weight:800;
}

.feature p{
    color:#a5afc5;
    font-size:10px;
    letter-spacing:1px;
    margin-top:4px;
}

.join-btn{
    display:block;
    margin-top:25px;
    text-decoration:none;
    text-align:center;
    background:linear-gradient(90deg,#0f49ff,#00aaff);
    color:white;
    padding:16px;
    border-radius:22px;
    font-size:16px;
    font-weight:700;
    box-shadow:0 0 20px rgba(0,150,255,.5);
    transition:.3s;
}

.join-btn:hover{
    transform:translateY(-2px);
}

@media(max-width:360px){

.container{
    max-width:310px;
}

.profile{
    width:115px;
    height:115px;
}

.title h1,
.title h2{
    font-size:32px;
}

.desc{
    font-size:13px;
}

.feature h3{
    font-size:16px;
}

.join-btn{
    font-size:15px;
    padding:14px;
}
}
</style>
</head>
